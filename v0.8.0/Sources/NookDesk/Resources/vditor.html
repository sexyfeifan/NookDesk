<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NookDesk Vditor</title>
  <link rel="stylesheet" href="./vditor-dist/index.css">
  <style>
    :root {
      color-scheme: light dark;
      --hd-bg: #f7f6f1;
      --hd-fg: #111827;
      --hd-muted: #6b7280;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --hd-bg: #111418;
        --hd-fg: #e5e7eb;
        --hd-muted: #9ca3af;
      }
    }
    html, body {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: var(--hd-bg); color: var(--hd-fg);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    }
    #editor { height: 100vh; }
    #fallback {
      display: none; box-sizing: border-box; height: 100%;
      padding: 24px; color: var(--hd-muted); line-height: 1.7;
      white-space: pre-wrap; background: var(--hd-bg);
    }
  </style>
</head>
<body>
  <div id="editor"></div>
  <div id="fallback"></div>

  <script src="./vditor-dist/index.min.js"></script>
  <script>
    (function () {
      var editor = null;
      var fallbackEl = document.getElementById("fallback");
      var editorEl = document.getElementById("editor");
      var lastRange = null;

      function post(type, value) {
        if (!window.webkit || !window.webkit.messageHandlers || !window.webkit.messageHandlers.vditor) {
          return;
        }
        window.webkit.messageHandlers.vditor.postMessage({ type: type, value: value || "" });
      }

      function showFallback(message) {
        editorEl.style.display = "none";
        fallbackEl.style.display = "block";
        fallbackEl.textContent = message;
        post("error", message);
      }

      function emitValue() {
        if (!editor) return;
        post("input", editor.getValue());
      }

      function rememberSelection() {
        var selection = window.getSelection();
        if (!selection || selection.rangeCount === 0) return;
        var range = selection.getRangeAt(0);
        if (!editorEl.contains(range.commonAncestorContainer)) return;
        lastRange = range.cloneRange();
      }

      function restoreSelection() {
        if (!lastRange) return;
        var selection = window.getSelection();
        if (!selection) return;
        selection.removeAllRanges();
        selection.addRange(lastRange);
      }

      function insertMarkdown(markdown) {
        if (!editor) return;
        editor.focus();
        restoreSelection();
        editor.insertMD(markdown || "");
        emitValue();
      }

      function toolbarItems() {
        return [
          "emoji", "headings", "bold", "italic", "strike", "link", "|",
          "list", "ordered-list", "check", "outdent", "indent", "|",
          "quote", "line", "code", "inline-code", "insert-after", "insert-before", "|",
          "record", "table", "|",
          "undo", "redo", "|",
          "fullscreen", "edit-mode",
          {
            name: "more",
            toolbar: ["both", "code-theme", "content-theme", "export", "outline", "preview", "devtools", "info", "help"]
          }
        ];
      }

      function currentThemeName() {
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "classic";
      }

      function ensureBridge() {
        window.NookDeskVditorBridge = {
          setValue: function (value) {
            if (!editor) return;
            editor.setValue(value || "", true);
          },
          getValue: function () {
            if (!editor) return "";
            return editor.getValue();
          },
          focus: function () {
            if (editor) editor.focus();
          },
          rememberSelection: function () {
            rememberSelection();
          },
          insertMarkdown: function (value) {
            insertMarkdown(value);
          }
        };
      }

      function bootstrap() {
        if (typeof Vditor === "undefined") {
          showFallback("Vditor 资源加载失败。请使用兼容模式继续编辑。");
          return;
        }

        editor = new Vditor("editor", {
          mode: "ir",
          height: "100%",
          theme: currentThemeName(),
          icon: "",
          lang: "zh_CN",
          cache: { enable: false },
          toolbar: toolbarItems(),
          toolbarConfig: { pin: true },
          placeholder: "开始写作...",
          after: function () {
            ensureBridge();
            post("ready", "");
          },
          input: function (value) {
            post("input", value);
          }
        });

        var schemeMedia = window.matchMedia("(prefers-color-scheme: dark)");
        if (typeof schemeMedia.addEventListener === "function") {
          schemeMedia.addEventListener("change", function () {
            if (!editor || typeof editor.setTheme !== "function") return;
            var dark = schemeMedia.matches;
            try {
              editor.setTheme(dark ? "dark" : "classic", dark ? "dark" : "light", dark ? "native" : "github");
            } catch (e) {}
          });
        }
      }

      window.addEventListener("load", function () {
        bootstrap();
      });

      document.addEventListener("selectionchange", function () {
        rememberSelection();
      });

      window.setTimeout(function () {
        if (!editor && typeof Vditor === "undefined") {
          showFallback("Vditor 初始化超时。请使用兼容模式继续编辑。");
        }
      }, 5000);
    })();
  </script>
</body>
</html>
