<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HugoDesk Vditor</title>
  <link rel="stylesheet" href="./index.css">
  <style>
    :root {
      color-scheme: light dark;
      --hd-bg: #f7f6f1;
      --hd-fg: #111827;
      --hd-muted: #6b7280;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --hd-bg: #111418;
        --hd-fg: #e5e7eb;
        --hd-muted: #9ca3af;
      }
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: var(--hd-bg);
      color: var(--hd-fg);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    }

    #editor {
      height: 100vh;
    }

    #fallback {
      display: none;
      box-sizing: border-box;
      height: 100%;
      padding: 24px;
      color: var(--hd-muted);
      line-height: 1.7;
      white-space: pre-wrap;
      background: var(--hd-bg);
    }
  </style>
</head>
<body>
  <div id="editor"></div>
  <div id="fallback"></div>

  <script src="./zh_CN.js"></script>
  <script src="./ant.js"></script>
  <script src="./index.min.js"></script>
  <script>
    (function () {
      var editor = null;
      var fallbackEl = document.getElementById("fallback");
      var editorEl = document.getElementById("editor");
      var lastRange = null;

      function post(type, value) {
        if (!window.webkit || !window.webkit.messageHandlers || !window.webkit.messageHandlers.vditor) {
          return;
        }
        window.webkit.messageHandlers.vditor.postMessage({ type: type, value: value || "" });
      }

      function showFallback(message) {
        editorEl.style.display = "none";
        fallbackEl.style.display = "block";
        fallbackEl.textContent = message;
        post("error", message);
      }

      function emitValue() {
        if (!editor) {
          return;
        }
        post("input", editor.getValue());
      }

      function rememberSelection() {
        var selection = window.getSelection();
        if (!selection || selection.rangeCount === 0) {
          return;
        }

        var range = selection.getRangeAt(0);
        if (!editorEl.contains(range.commonAncestorContainer)) {
          return;
        }

        lastRange = range.cloneRange();
      }

      function restoreSelection() {
        if (!lastRange) {
          return;
        }

        var selection = window.getSelection();
        if (!selection) {
          return;
        }

        selection.removeAllRanges();
        selection.addRange(lastRange);
      }

      function insertMarkdown(markdown) {
        if (!editor) {
          return;
        }
        editor.focus();
        restoreSelection();
        editor.insertMD(markdown || "");
        emitValue();
      }

      function customButton(name, tip, icon, handler) {
        return {
          name: name,
          tip: tip,
          icon: icon,
          click: handler
        };
      }

      function uploadIcon() {
        return '<svg viewBox="0 0 16 16"><path d="M8 1.5l3 3-.94.94L8.75 4.12V11h-1.5V4.12L5.94 5.44 5 4.5l3-3zm-5.5 11h11V14h-11z"/></svg>';
      }

      function footnoteIcon() {
        return '<svg viewBox="0 0 16 16"><path d="M2 3h7v1.5H6.25V13h-1.5V4.5H2zm9.2 2.8c1.44 0 2.3.79 2.3 1.99 0 .77-.35 1.3-1.2 2.14l-1.29 1.28h2.56V13H9.9v-1.26l1.82-1.82c.61-.61.82-.95.82-1.39 0-.53-.37-.84-.97-.84-.64 0-1.01.33-1.08.95H9.08c.08-1.76 1.22-2.84 3.12-2.84z"/></svg>';
      }

      function detailsIcon() {
        return '<svg viewBox="0 0 16 16"><path d="M3 3h10v1.5H3zm0 4.25h6v1.5H3zm0 4.25h10V13H3zm8.25-4.6 2.25 2.1-2.25 2.1v-4.2z"/></svg>';
      }

      function toolbarItems() {
        return [
          "emoji",
          "headings",
          "bold",
          "italic",
          "strike",
          "link",
          "|",
          "list",
          "ordered-list",
          "check",
          "outdent",
          "indent",
          "|",
          "quote",
          "line",
          "code",
          "inline-code",
          "insert-after",
          "insert-before",
          "|",
          customButton("upload", "上传图片到 Hugo 项目", uploadIcon(), function () {
            rememberSelection();
            post("pickImage", "");
          }),
          "record",
          "table",
          customButton("hugodesk-footnote", "插入脚注", footnoteIcon(), function () {
            insertMarkdown("[^1]");
          }),
          customButton("hugodesk-details", "插入折叠块", detailsIcon(), function () {
            insertMarkdown("\n<details>\n<summary>展开查看</summary>\n\n内容\n\n</details>\n");
          }),
          "|",
          "undo",
          "redo",
          "|",
          "fullscreen",
          "edit-mode",
          {
            name: "more",
            toolbar: [
              "both",
              "code-theme",
              "content-theme",
              "export",
              "outline",
              "preview",
              "devtools",
              "info",
              "help"
            ]
          }
        ];
      }

      function currentThemeName() {
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "classic";
      }

      function ensureBridge() {
        window.HugoDeskVditorBridge = {
          setValue: function (value) {
            if (!editor) {
              return;
            }
            editor.setValue(value || "", true);
          },
          getValue: function () {
            if (!editor) {
              return "";
            }
            return editor.getValue();
          },
          focus: function () {
            if (editor) {
              editor.focus();
            }
          },
          rememberSelection: function () {
            rememberSelection();
          },
          insertMarkdown: function (value) {
            insertMarkdown(value);
          }
        };
      }

      function bootstrap() {
        if (typeof Vditor === "undefined") {
          showFallback("Vditor 资源加载失败。请切回兼容模式继续编辑。");
          return;
        }

        editor = new Vditor("editor", {
          mode: "ir",
          height: "100%",
          theme: currentThemeName(),
          icon: "",
          i18n: window.VditorI18n,
          lang: "zh_CN",
          _lutePath: "./lute.min.js",
          cache: {
            enable: false
          },
          toolbar: toolbarItems(),
          toolbarConfig: {
            pin: true
          },
          placeholder: "开始写作...",
          after: function () {
            ensureBridge();
            post("ready", "");
          },
          input: function (value) {
            post("input", value);
          }
        });

        var schemeMedia = window.matchMedia("(prefers-color-scheme: dark)");
        if (typeof schemeMedia.addEventListener === "function") {
          schemeMedia.addEventListener("change", function () {
            if (!editor || typeof editor.setTheme !== "function") {
              return;
            }
            var dark = schemeMedia.matches;
            try {
              editor.setTheme(dark ? "dark" : "classic", dark ? "dark" : "light", dark ? "native" : "github");
            } catch (error) {
              // Ignore theme switch errors and keep editor usable.
            }
          });
        }
      }

      window.addEventListener("load", function () {
        bootstrap();
      });

      document.addEventListener("selectionchange", function () {
        rememberSelection();
      });

      window.setTimeout(function () {
        if (!editor && typeof Vditor === "undefined") {
          showFallback("Vditor 初始化超时。请切回兼容模式继续编辑。");
        }
      }, 4000);
    })();
  </script>
</body>
</html>
